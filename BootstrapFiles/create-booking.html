<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDXpress - Create Booking Design</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=ADLaM+Display&display=swap">
  <style>
    body { background: #fafafa; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    h1, h3 { font-family: "ADLaM Display", serif; }
    .booking-card { background: #fff; border-radius: 20px; padding: 1.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 1.2rem; }
    .btn-pill { border-radius: 30px; padding: 10px 24px; }
    .parcel-row { background: #f8f9fa; border-radius: 15px; padding: 1rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-1">Create New Booking</h1>
    <p class="text-muted mb-4">Add multiple parcels under one booking.</p>

    <div class="booking-card">
      <h3>Service and Branches</h3>
      <div class="row g-3">
        <div class="col-md-4"><label class="form-label">Service Type</label><select class="form-select"><option>Express</option><option>Standard</option></select></div>
        <div class="col-md-4"><label class="form-label">Origin Branch</label><select class="form-select"><option>Manila</option><option>Cebu</option></select></div>
        <div class="col-md-4"><label class="form-label">Destination Branch</label><select class="form-select"><option>Cebu</option><option>Davao</option></select></div>
      </div>
    </div>

    <div class="booking-card">
      <h3>Sender Information</h3>
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Full Name</label><input class="form-control" type="text"></div>
        <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" type="text"></div>
        <div class="col-12"><label class="form-label">Address</label><input class="form-control" type="text"></div>
      </div>
    </div>

    <div class="booking-card">
      <h3>Receiver Information</h3>
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Full Name</label><input class="form-control" type="text"></div>
        <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" type="text"></div>
        <div class="col-md-8"><label class="form-label">Address</label><input class="form-control" type="text"></div>
        <div class="col-md-4"><label class="form-label">Notes</label><input class="form-control" type="text"></div>
      </div>
    </div>

    <div class="booking-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">Parcels</h3>
        <button class="btn btn-success btn-pill" type="button">+ Add Parcel</button>
      </div>
      <div class="parcel-row">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Description</label><input class="form-control" type="text"></div>
          <div class="col-md-2"><label class="form-label">Weight (kg)</label><input class="form-control" type="number" value="0"></div>
          <div class="col-md-2"><label class="form-label">Declared Value</label><input class="form-control" type="number" value="0"></div>
          <div class="col-md-2 d-flex align-items-end"><button class="btn btn-danger w-100 btn-pill" type="button">Remove</button></div>
        </div>
      </div>
    </div>

    <div class="d-flex gap-3 mt-3">
      <button class="btn btn-primary btn-pill" type="button">Create Booking</button>
      <a class="btn btn-outline-secondary btn-pill" href="#">Cancel</a>
    </div>
  </div>
</body>
</html>
