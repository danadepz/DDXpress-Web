<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDXpress - Register Design</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=ADLaM+Display&display=swap">
  <style>
    body { background: linear-gradient(135deg, #fff 0%, #fafafa 100%); min-height: 100vh; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    h1 { font-family: "ADLaM Display", serif; }
    .register-card { background: #fff; border-radius: 25px; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    .form-control { border-radius: 50px; padding: 12px 20px; border: 2px solid #e0e0e0; }
    .btn-create { border-radius: 30px; padding: 12px 35px; border: 2px solid #0d6efd; background: #0d6efd; color: #fff; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <a class="btn btn-outline-secondary rounded-pill px-4 mb-3" href="#">Back to Login</a>
        <div class="register-card">
          <h1 class="text-center mb-2">Customer Registration</h1>
          <p class="text-center text-muted mb-4">Editable Bootstrap template for registration design.</p>
          <form>
            <div class="row g-3">
              <div class="col-md-6"><input class="form-control" type="text" placeholder="Full Name"></div>
              <div class="col-md-6"><input class="form-control" type="email" placeholder="Email"></div>
              <div class="col-md-6"><input class="form-control" type="password" placeholder="Password"></div>
              <div class="col-md-6"><input class="form-control" type="text" placeholder="Phone"></div>
              <div class="col-12"><input class="form-control" type="text" placeholder="Address"></div>
            </div>
            <div class="text-center mt-4"><button class="btn-create" type="button">Create Account</button></div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
